version: 2

dist: ../dist-pach/docker

builds:
    - id: pachd
      main: ./src/server/cmd/pachd
      binary: pachd
      flags:
          - -cover
          - -covermode=atomic
          - -coverpkg=github.com/pachyderm/pachyderm/v2/...
      env:
          - CGO_ENABLED=0
      ldflags:
          - -X {{ .Env.CLIENT_ADDITIONAL_VERSION }} -X
            "github.com/pachyderm/pachyderm/v2/src/version.AppVersion={{ .Env.VERSION }}"
      goos:
          - linux
      goarch:
          - amd64
          - arm64
      gcflags:
          - "all=-trimpath={{.Env.PWD}}"
    - id: worker
      main: ./src/server/cmd/worker
      binary: worker
      flags:
          - -cover
          - -covermode=atomic
          - -coverpkg=github.com/pachyderm/pachyderm/v2/...
      env:
          - CGO_ENABLED=0
      ldflags:
          - -X {{ .Env.CLIENT_ADDITIONAL_VERSION }} -X
            "github.com/pachyderm/pachyderm/v2/src/version.AppVersion={{ .Env.VERSION }}"
      goos:
          - linux
      goarch:
          - amd64
          - arm64
      gcflags:
          - "all=-trimpath={{.Env.PWD}}"
    - id: worker_init
      dir: etc/worker
      main: init.go
      binary: worker_init
      env:
          - CGO_ENABLED=0
      ldflags:
          - -X {{ .Env.CLIENT_ADDITIONAL_VERSION }} -X
            "github.com/pachyderm/pachyderm/v2/src/version.AppVersion={{ .Env.VERSION }}"
      goos:
          - linux
      goarch:
          - amd64
          - arm64
      gcflags:
          - "all=-trimpath={{.Env.PWD}}"
    - id: pachctl
      main: ./src/server/cmd/pachctl
      binary: pachctl
      env:
          - CGO_ENABLED=0
      ldflags:
          - -X {{ .Env.CLIENT_ADDITIONAL_VERSION }} -X
            "github.com/pachyderm/pachyderm/v2/src/version.AppVersion={{ .Env.VERSION }}"
      goos:
          - linux
      goarch:
          - amd64
          - arm64
      gcflags:
          - "all=-trimpath={{.Env.PWD}}"

archives:
    - formats: binary
      ids:
          - pachctl

checksum:
    disable: true

changelog:
    disable: true

release:
    disable: true

dockers_v2:
    - id: pachd-amd64
      ids: [pachd]
      dockerfile: Dockerfile.pachd
      images:
          - "pachyderm/pachd-amd64"
      tags:
          - "cover-{{ .FullCommit }}"
      extra_files:
          - dex-assets
          - LICENSE
          - licenses
      platforms:
          - linux/amd64
      labels:
          version: "{{.Version}}"
          release: "{{.Version}}"
      flags:
          - "--network=host"
          - "--platform=linux/amd64"
    - id: pachctl-amd64
      ids: [pachctl]
      dockerfile: Dockerfile.pachctl
      images:
          - pachyderm/pachctl-amd64
      tags:
          - "cover-{{ .FullCommit }}"
      extra_files:
          - LICENSE
          - licenses
      platforms:
          - linux/amd64
      labels:
          version: "{{.Version}}"
          release: "{{.Version}}"
      flags:
          - "--network=host"
          - "--progress=plain"
          - "--platform=linux/amd64"
    - id: worker-amd64
      ids: [pachctl, worker_init, worker]
      dockerfile: Dockerfile.worker
      images:
          - "pachyderm/worker-amd64"
      tags:
          - "cover-{{ .FullCommit }}"
      extra_files:
          - LICENSE
          - licenses
      platforms:
          - linux/amd64
      labels:
          version: "{{.Version}}"
          release: "{{.Version}}"
      flags:
          - "--progress=plain"
          - "--platform=linux/amd64"

    # arm64 builds follow
    - id: pachd-arm64
      ids: [pachd]
      dockerfile: Dockerfile.pachd
      images:
          - "pachyderm/pachd-arm64"
      tags:
          - "cover-{{ .FullCommit }}"
      extra_files:
          - dex-assets
          - LICENSE
          - licenses
      platforms:
          - linux/arm64
      labels:
          version: "{{.Version}}"
          release: "{{.Version}}"
      flags:
           - "--network=host"
           - "--platform=linux/arm64"
    - id: pachctl-arm64
      ids: [pachctl]
      dockerfile: Dockerfile.pachctl
      images:
          - pachyderm/pachctl-arm64
      tags:
          - "cover-{{ .FullCommit }}"
      extra_files:
          - LICENSE
          - licenses
      platforms:
          - linux/arm64
      labels:
          version: "{{.Version}}"
          release: "{{.Version}}"
      flags:
          - "--network=host"
          - "--progress=plain"
          - "--platform=linux/arm64"
    - id: worker-arm64
      ids: [pachctl, worker_init, worker]
      dockerfile: Dockerfile.worker
      images:
          - "pachyderm/worker-arm64"
      tags:
          - "cover-{{ .FullCommit }}"
      extra_files:
          - LICENSE
          - licenses
      platforms:
          - linux/arm64
      labels:
          version: "{{.Version}}"
          release: "{{.Version}}"
      flags:
          - "--progress=plain"
          - "--platform=linux/arm64"
